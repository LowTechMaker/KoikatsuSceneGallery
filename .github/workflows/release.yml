name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: windows-latest
    env:
      NuGetPackageSourceCredentials_SceneGalleryGitHub: "Username=${{ github.actor }};Password=${{ secrets.GITHUB_TOKEN }}"

    steps:
      - name: Checkout application
        uses: actions/checkout@v6
        with:
          path: KoikatsuSceneGallery

      - name: Checkout Pixiv Authors plugin
        uses: actions/checkout@v6
        with:
          repository: LowTechMaker/pixiv-data-plugin
          path: PixivAuthorsPlugin

      - name: Checkout BepisDB plugin
        uses: actions/checkout@v6
        with:
          repository: LowTechMaker/BepisDbPlugin
          path: BepisDbPlugin

      - name: Checkout Fanbox plugin
        uses: actions/checkout@v6
        with:
          repository: lowtechmaker/FanboxWebView2Plugin
          path: FanboxWebView2Plugin

      - name: Checkout GitHub release update plugin
        uses: actions/checkout@v6
        with:
          repository: LowTechMaker/GitHubReleaseUpdatePlugin
          path: GitHubReleaseUpdatePlugin

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      - name: Determine version tag
        id: version
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Publish x64
        shell: pwsh
        run: KoikatsuSceneGallery/scripts/Publish-WithPlugins.ps1 -Configuration Release -RuntimeIdentifier win-x64

      - name: Package zip
        shell: pwsh
        run: |
          $publishDir = "KoikatsuSceneGallery/artifacts/release/win-x64"
          Get-ChildItem "$publishDir" -Include "*.pdb" -Recurse | Remove-Item -Force -Confirm:$false
          Compress-Archive -Path "$publishDir\*" -DestinationPath "KoikatsuSceneGallery-${{ steps.version.outputs.tag }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: "*.zip"
