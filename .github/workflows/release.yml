name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      - name: Determine version tag
        id: version
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Publish x64
        run: dotnet publish -c Release -p:Platform=x64 -p:RuntimeIdentifier=win-x64

      - name: Package zip
        shell: pwsh
        run: |
          $publishDir = "bin\Release\net10.0-windows10.0.26100.0\win-x64\publish"
          Compress-Archive -Path "$publishDir\*" -DestinationPath "KoikatsuSceneGallery-${{ steps.version.outputs.tag }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: "*.zip"
