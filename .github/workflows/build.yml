name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  core-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      - name: Test Core
        run: dotnet test KoikatsuSceneGallery.Tests/KoikatsuSceneGallery.Tests.csproj -c Release

  build:
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x64]
        configuration: [Release]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      - name: Build
        run: dotnet build KoikatsuSceneGallery.csproj -c ${{ matrix.configuration }} -p:Platform=${{ matrix.platform }} -p:RuntimeIdentifier=win-${{ matrix.platform }}

      - name: Test
        run: dotnet test KoikatsuSceneGallery.Tests/KoikatsuSceneGallery.Tests.csproj -c ${{ matrix.configuration }}
